{% extends "base.html" %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-navy text-white">
                    <h5 class="mb-0"><i class="fas fa-plus-circle me-2"></i>{{ accion }} Gasto Operativo</h5>
                </div>
                <form action="{{ url_for('gasto_nuevo') }}" method="POST" class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Fecha</label>
                            <input type="date" name="fecha" class="form-control" value="{{ hoy }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Categoría</label>
                            <select name="categoria" class="form-select" required>
                                <option value="Servicios (Luz/Agua/Internet)">Servicios</option>
                                <option value="Alquiler">Alquiler</option>
                                <option value="Sueldos">Sueldos</option>
                                <option value="Limpieza">Limpieza</option>
                                <option value="Impuestos">Impuestos</option>
                                <option value="Mantenimiento">Mantenimiento</option>
                                <option value="Otros">Otros</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Descripción / Concepto</label>
                            <input type="text" name="descripcion" class="form-control" placeholder="Ej: Pago internet Abril" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Monto</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" step="0.01" name="monto" class="form-control" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Medio de Pago</label>
                            <select name="medio_pago" class="form-select">
                                <option value="Efectivo">Efectivo (Resta de Caja)</option>
                                <option value="Banco / Transferencia">Banco / Transferencia</option>
                                <option value="Tarjeta">Tarjeta</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Proveedor / Beneficiario</label>
                            <input type="text" name="proveedor" class="form-control">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Observaciones</label>
                            <textarea name="observaciones" class="form-control" rows="2"></textarea>
                        </div>
                    </div>
                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">Guardar Gasto</button>
                        <a href="{{ url_for('gastos') }}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
