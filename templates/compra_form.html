{% extends "base.html" %}

{% block title %}{{ accion }} Compra - Nexar Tienda{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <div>
                <h1 class="h3 mb-0"><i class="fas fa-shopping-cart text-primary me-2"></i>{{ accion }} Compra</h1>
                <p class="text-muted mb-0">Registrar una nueva compra y actualizar el stock.</p>
            </div>
            <a href="{{ url_for('compras') }}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i>Volver a Compras</a>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Fecha</label>
                            <input type="date" class="form-control" name="fecha" value="{{ compra.fecha if compra else '' }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">N° Remito</label>
                            <input type="text" class="form-control" name="numero_remito" value="{{ compra.numero_remito if compra else '' }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Proveedor</label>
                            <select class="form-select" name="proveedor_id" required>
                                <option value="">Seleccionar proveedor</option>
                                {% for proveedor in proveedores %}
                                <option value="{{ proveedor.id }}" {% if compra and compra.proveedor_id == proveedor.id %}selected{% endif %}>{{ proveedor.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Producto</label>
                            <select class="form-select" name="producto_id" required>
                                <option value="">Seleccionar producto</option>
                                {% for producto in productos %}
                                <option value="{{ producto.id }}" {% if compra and compra.producto_id == producto.id %}selected{% endif %}>{{ producto.descripcion }} - {{ producto.codigo_interno }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">Cantidad</label>
                                <input type="number" step="0.01" min="0" class="form-control" name="cantidad" value="{{ compra.cantidad if compra else '1' }}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Costo Unitario</label>
                                <input type="number" step="0.01" min="0" class="form-control" name="costo_unitario" value="{{ compra.costo_unitario if compra else '0.00' }}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Total</label>
                                <input type="text" class="form-control" value="{{ ((compra.cantidad if compra else 0) * (compra.costo_unitario if compra else 0)) | float }}" disabled>
                            </div>
                        </div>
                        <div class="mb-3 mt-3">
                            <label class="form-label">Observaciones</label>
                            <textarea class="form-control" name="observaciones" rows="3">{{ compra.observaciones if compra else '' }}</textarea>
                        </div>

                        <div class="text-end">
                            <button class="btn btn-secondary" type="reset">Limpiar</button>
                            <button class="btn btn-primary" type="submit">{{ accion }} Compra</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
