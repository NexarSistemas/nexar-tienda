<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema cerrado — Nexar Tienda</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #1e3a5f; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <i class="fas fa-power-off fa-4x mb-4"></i>
        <h1>Sistema cerrado</h1>
        <p class="lead">Nexar Tienda se ha detenido correctamente.</p>
        <p class="text-muted" id="status-msg">La ventana se cerrará automáticamente...</p>
    </div>

    <script>
        // 1) Pedir apagado del servidor (en segundo plano)
        fetch('/shutdown', {
            method: 'POST',
            keepalive: true,
            headers: { 'X-CSRFToken': '{{ csrf_token() }}' }
        }).catch(() => {});

        // 2) Cerrar ventana en webview/navegador
        setTimeout(function() {
            if (window.pywebview?.api?.closeWindow) {
                window.pywebview.api.closeWindow();
                return;
            }
            window.close();
        }, 1200);
    </script>
</body>
</html>
