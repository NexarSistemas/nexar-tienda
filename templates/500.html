{% extends "base.html" %}

{% block title %}Error del servidor — Nexar Tienda{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <h1 class="display-1 text-danger">500</h1>
            <h2 class="mb-4">Error del servidor</h2>
            <p class="text-muted mb-2">Ha ocurrido un error interno.</p>
            {% if error %}
            <pre class="alert alert-danger text-start"><code>{{ error }}</code></pre>
            {% endif %}
            <div class="mt-4">
                <a href="{{ url_for('dashboard') }}" class="btn btn-primary me-2">
                    <i class="fas fa-home"></i> Volver al Dashboard
                </a>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-secondary">
                    <i class="fas fa-sign-out-alt"></i> Cerrar sesión
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
