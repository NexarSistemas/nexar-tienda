name: Build & Release Nexar Tienda

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ════════════════════════════════════════
  # 🔍 DETECTAR VERSIÓN
  # ════════════════════════════════════════
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v4

      - name: Obtener y validar versión
        id: ver
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          CHANGELOG_VERSION=$(grep -m1 -oP '\[\K[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md)
          if [ "$VERSION" != "$CHANGELOG_VERSION" ]; then
            echo "❌ VERSION ($VERSION) no coincide con la última entrada de CHANGELOG ($CHANGELOG_VERSION)."
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Versión detectada: $VERSION"

  # ════════════════════════════════════════
  # 🐧 BUILD LINUX (.deb)
  # ════════════════════════════════════════
  build-linux:
    needs: check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validar token del SDK de licencias
        env:
          NEXAR_SDK_TOKEN: ${{ secrets.NEXAR_SDK_TOKEN }}
          NEXAR_LICENCIAS_REPOSITORY: ${{ vars.NEXAR_LICENCIAS_REPOSITORY || 'rolojnb/nexar_licencias' }}
        run: |
          if [ -z "$NEXAR_SDK_TOKEN" ]; then
            echo "❌ ERROR: El secret NEXAR_SDK_TOKEN no está configurado."
            echo "   Este workflow necesita leer el repositorio privado: $NEXAR_LICENCIAS_REPOSITORY"
            echo "   Crear un PAT con permiso de lectura sobre ese repo y guardarlo en:"
            echo "   Settings → Secrets and variables → Actions → New repository secret"
            echo "   Nombre: NEXAR_SDK_TOKEN"
            exit 1
          fi
          API_STATUS=$(curl -sS -o /tmp/nexar_licencias_repo.json -w "%{http_code}" \
            -H "Authorization: Bearer ${NEXAR_SDK_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${NEXAR_LICENCIAS_REPOSITORY}")
          if [ "$API_STATUS" != "200" ]; then
            echo "❌ ERROR: GitHub API no permite ver $NEXAR_LICENCIAS_REPOSITORY con NEXAR_SDK_TOKEN. HTTP $API_STATUS"
            echo "   401: token inválido o mal copiado."
            echo "   403: token sin permisos suficientes."
            echo "   404: repo privado invisible para ese token, repo mal escrito o no seleccionado en el PAT."
            exit 1
          fi

      - name: Checkout SDK de licencias
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.NEXAR_LICENCIAS_REPOSITORY || 'rolojnb/nexar_licencias' }}
          path: nexar_licencias_src
          ref: ${{ vars.NEXAR_LICENCIAS_REF || 'main' }}
          token: ${{ secrets.NEXAR_SDK_TOKEN }}

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fakeroot \
            dpkg \
            python3-gi \
            python3-gi-cairo \
            gir1.2-webkit2-4.1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install \
            flask \
            pywebview \
            pyinstaller \
            openpyxl \
            reportlab \
            python-dotenv \
            markdown \
            requests \
            cryptography
          pip install ./nexar_licencias_src

      - name: Generar configuración pública de licencias
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - <<'PY'
          import json, os
          url = os.getenv("SUPABASE_URL", "").strip()
          anon = os.getenv("SUPABASE_ANON_KEY", "").strip() or os.getenv("SUPABASE_KEY", "").strip()
          if not url or not anon:
              print("❌ ERROR: SUPABASE_URL y SUPABASE_ANON_KEY/SUPABASE_KEY son obligatorios para compilar un instalador con activación online.")
              print("   Configurarlos en Settings → Secrets and variables → Actions.")
              raise SystemExit(1)
          os.makedirs("build", exist_ok=True)
          with open("build/license_runtime_config.json", "w", encoding="utf-8") as fh:
              json.dump({
                  "SUPABASE_URL": url,
                  "SUPABASE_ANON_KEY": anon,
                  "SUPABASE_KEY": anon,
                  "LICENSE_PRODUCT": "nexar-tienda"
              }, fh, indent=2)
          print("✅ Configuración pública de licencias generada para runtime.")
          PY

      - name: Escribir clave pública RSA
        env:
          PUBLIC_KEY: ${{ secrets.PUBLIC_KEY }}
        run: |
          if [ -z "$PUBLIC_KEY" ]; then
            echo "❌ ERROR: El secret PUBLIC_KEY no está configurado en el repositorio."
            echo "   Ir a: Settings → Secrets and variables → Actions → New repository secret"
            echo "   Nombre: PUBLIC_KEY"
            echo "   Valor: contenido de keys/public_key.pem (incluir las líneas -----BEGIN/END-----)"
            exit 1
          fi
          mkdir -p keys
          echo "$PUBLIC_KEY" > keys/public_key.pem
          echo "✅ keys/public_key.pem escrito ($(wc -c < keys/public_key.pem) bytes)"

      - name: Build Linux con PyInstaller
        run: |
          pyinstaller build/nexar_tienda_linux.spec \
            --distpath dist \
            --workpath build/work \
            --noconfirm

      - name: Verificar binario generado
        run: |
          if [ ! -f "dist/NexarTienda" ]; then
            echo "❌ No se encontró dist/NexarTienda"
            ls dist/ || echo "(directorio dist vacío)"
            exit 1
          fi
          echo "✅ Binario encontrado: $(du -sh dist/NexarTienda)"

      - name: Generar paquete .deb
        run: |
          chmod +x build_deb.sh
          bash build_deb.sh

      - name: Preparar artefactos Linux
        run: |
          mkdir -p release
          cp *.deb release/ 2>/dev/null || true
          echo "📦 Contenido de release/:"
          ls -lh release/

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: release/**/*

  # ════════════════════════════════════════
  # 🪟 BUILD WINDOWS (.exe + Inno Setup)
  # ════════════════════════════════════════
  build-windows:
    needs: check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validar token del SDK de licencias
        shell: pwsh
        env:
          NEXAR_SDK_TOKEN: ${{ secrets.NEXAR_SDK_TOKEN }}
          NEXAR_LICENCIAS_REPOSITORY: ${{ vars.NEXAR_LICENCIAS_REPOSITORY || 'rolojnb/nexar_licencias' }}
        run: |
          if (-not $env:NEXAR_SDK_TOKEN) {
            Write-Error "❌ ERROR: El secret NEXAR_SDK_TOKEN no está configurado."
            Write-Host "   Este workflow necesita leer el repositorio privado: $env:NEXAR_LICENCIAS_REPOSITORY"
            Write-Host "   Crear un PAT con permiso de lectura sobre ese repo y guardarlo en:"
            Write-Host "   Settings → Secrets and variables → Actions → New repository secret"
            Write-Host "   Nombre: NEXAR_SDK_TOKEN"
            exit 1
          }
          $headers = @{
            Authorization = "Bearer $env:NEXAR_SDK_TOKEN"
            Accept = "application/vnd.github+json"
          }
          try {
            Invoke-RestMethod -Uri "https://api.github.com/repos/$env:NEXAR_LICENCIAS_REPOSITORY" -Headers $headers | Out-Null
          } catch {
            $statusCode = $_.Exception.Response.StatusCode.value__
            Write-Error "❌ ERROR: GitHub API no permite ver $env:NEXAR_LICENCIAS_REPOSITORY con NEXAR_SDK_TOKEN. HTTP $statusCode"
            Write-Host "   401: token inválido o mal copiado."
            Write-Host "   403: token sin permisos suficientes."
            Write-Host "   404: repo privado invisible para ese token, repo mal escrito o no seleccionado en el PAT."
            exit 1
          }

      - name: Checkout SDK de licencias
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.NEXAR_LICENCIAS_REPOSITORY || 'rolojnb/nexar_licencias' }}
          path: nexar_licencias_src
          ref: ${{ vars.NEXAR_LICENCIAS_REF || 'main' }}
          token: ${{ secrets.NEXAR_SDK_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install `
            flask `
            pywebview `
            pythonnet `
            pyinstaller `
            openpyxl `
            reportlab `
            python-dotenv `
            markdown `
            requests `
            cryptography
          pip install ./nexar_licencias_src

      - name: Generar configuración pública de licencias
        shell: pwsh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          $supabaseKey = if ($env:SUPABASE_ANON_KEY) { $env:SUPABASE_ANON_KEY } else { $env:SUPABASE_KEY }
          if (-not $env:SUPABASE_URL -or -not $supabaseKey) {
            Write-Error "❌ ERROR: SUPABASE_URL y SUPABASE_ANON_KEY/SUPABASE_KEY son obligatorios para compilar un instalador con activación online."
            Write-Host "   Configurarlos en Settings → Secrets and variables → Actions."
            exit 1
          }
          New-Item -ItemType Directory -Force -Path build | Out-Null
          $config = @{
            SUPABASE_URL = $env:SUPABASE_URL
            SUPABASE_ANON_KEY = $supabaseKey
            SUPABASE_KEY = $supabaseKey
            LICENSE_PRODUCT = "nexar-tienda"
          }
          $config | ConvertTo-Json | Set-Content -Path build\license_runtime_config.json -Encoding UTF8
          Write-Host "✅ Configuración pública de licencias generada para runtime."

      - name: Instalar Inno Setup
        run: choco install innosetup -y

      - name: Escribir clave pública RSA
        shell: pwsh
        env:
          PUBLIC_KEY: ${{ secrets.PUBLIC_KEY }}
        run: |
          if (-not $env:PUBLIC_KEY) {
            Write-Error "❌ ERROR: El secret PUBLIC_KEY no está configurado en el repositorio."
            Write-Host "   Ir a: Settings → Secrets and variables → Actions → New repository secret"
            Write-Host "   Nombre: PUBLIC_KEY"
            Write-Host "   Valor: contenido de keys/public_key.pem"
            exit 1
          }
          New-Item -ItemType Directory -Force -Path keys | Out-Null
          $env:PUBLIC_KEY | Set-Content -Path keys\public_key.pem -Encoding UTF8
          $size = (Get-Item keys\public_key.pem).Length
          Write-Host "✅ keys/public_key.pem escrito ($size bytes)"

      - name: Build Windows con PyInstaller
        run: |
          pyinstaller build/nexar_tienda_windows.spec `
            --distpath dist `
            --workpath build/work `
            --noconfirm

      - name: Verificar binario generado
        shell: pwsh
        run: |
          if (!(Test-Path "dist\NexarTienda.exe")) {
            Write-Error "❌ No se encontró dist\NexarTienda.exe"
            Get-ChildItem dist -ErrorAction SilentlyContinue
            exit 1
          }
          $size = (Get-Item "dist\NexarTienda.exe").Length / 1MB
          Write-Host "✅ Binario encontrado: $([math]::Round($size, 1)) MB"

      - name: Generar instalador con Inno Setup
        shell: pwsh
        run: |
          $ver = "${{ needs.check.outputs.version }}"
          Write-Host "📦 Compilando instalador v$ver..."
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=$ver" `
            "build\nexar_tienda.iss"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "❌ Inno Setup falló con código $LASTEXITCODE"
            exit 1
          }
          Write-Host "✅ Instalador generado correctamente"

      - name: Preparar artefactos Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Get-ChildItem "dist\installer" -File | Copy-Item -Destination release\
          Write-Host "📦 Contenido de release\:"
          Get-ChildItem release | Format-Table Name, Length

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/**/*

  # ════════════════════════════════════════
  # 📦 PACKAGE: SHA256 + FIRMA GPG
  # ════════════════════════════════════════
  package:
    needs: [check, build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Unificar artefactos
        run: |
          mkdir final
          find artifacts -type f -exec cp {} final/ \;
          echo "📂 Artefactos unificados:"
          ls -lh final/

      - name: Limpiar SHA256 previos
        run: |
          rm -f final/SHA256SUMS*.txt
          rm -f final/*.sha256

      - name: Generar SHA256 único
        run: |
          cd final
          sha256sum * > SHA256SUMS.txt
          echo "🔒 Checksums generados:"
          cat SHA256SUMS.txt

      - name: Configurar GPG
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

      - name: Importar clave GPG
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "✅ Clave GPG importada"

      - name: Firmar archivos
        run: |
          find final -type f ! -name "*.sig" -exec \
          gpg --batch --yes \
              --pinentry-mode loopback \
              --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
              --detach-sign {} \;
          echo "✅ Archivos firmados"

      - uses: actions/upload-artifact@v4
        with:
          name: final
          path: final/*

  # ════════════════════════════════════════
  # 🚀 RELEASE EN GITHUB
  # ════════════════════════════════════════
  release:
    needs: [check, package]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: final
          path: final/

      - name: Instalar GitHub CLI
        run: sudo apt-get update && sudo apt-get install -y gh

      - name: Verificar si el release ya existe
        id: release_check
        run: |
          TAG="v${{ needs.check.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️ Release $TAG ya existe — solo se actualizarán los assets"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "🆕 Se creará el release $TAG"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar descripción desde CHANGELOG
        run: |
          VER="${{ needs.check.outputs.version }}"
          awk -v ver="$VER" '
          $0 ~ "## \\["ver"\\]" {flag=1; next}
          /^## \[/ && flag {exit}
          flag
          ' CHANGELOG.md > release.md
          echo "📝 Descripción del release:"
          cat release.md

      - name: Crear release (si no existe)
        if: steps.release_check.outputs.exists == 'false'
        run: |
          TAG="v${{ needs.check.outputs.version }}"
          gh release create "$TAG" \
            --title "Nexar Tienda v${{ needs.check.outputs.version }}" \
            --notes-file release.md \
            --latest \
            --target $GITHUB_SHA
          echo "✅ Release creado: $TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir assets al release
        run: |
          TAG="v${{ needs.check.outputs.version }}"

          for file in final/*; do
            name=$(basename "$file")
            echo "⬆️  Subiendo $name..."
            # Eliminar asset previo si existe (para permitir re-runs sin conflicto)
            gh release delete-asset "$TAG" "$name" -y 2>/dev/null || true
            gh release upload "$TAG" "$file"
            echo "   ✅ $name subido"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
